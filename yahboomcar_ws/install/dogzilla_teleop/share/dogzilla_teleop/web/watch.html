<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1c1c1c">
<title>Dogzilla Watch</title>
<script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #1c1c1c;
  --panel:  #252525;
  --border: #3a3a3a;
  --active: #00aa50;
  --warn:   #c88200;
  --danger: #be2828;
  --text:   #e6e6e6;
  --dim:    #6e6e6e;
}

html, body {
  width: 360px;
  height: 360px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* circular clip */
.dial {
  position: relative;
  width: 360px; height: 360px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--bg);
}

/* ── status bar ── */
.status {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--dim);
  white-space: nowrap;
}
#w-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--danger);
  transition: background .3s;
  flex-shrink: 0;
}
#w-dot.ok   { background: var(--active); }
#w-dot.wait { background: var(--warn); }
#w-bat { color: var(--text); font-weight: bold; }

/* ── d-pad ── */
.dpad {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -56%); /* shift up slightly to leave room for actions */
  display: grid;
  grid-template-columns: repeat(3, 78px);
  grid-template-rows: repeat(3, 58px);
  gap: 5px;
}
.dpad-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 50%;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: none;
  transition: background .1s;
}
.dpad-btn:active { background: var(--active); border-color: var(--active); }
.dpad-empty { visibility: hidden; }

.stop-btn {
  background: rgba(200,130,0,.15);
  border-color: var(--warn);
  font-size: 16px;
}
.stop-btn:active { background: var(--warn); border-color: var(--warn); }

/* ── action row ── */
.action-row {
  position: absolute;
  bottom: 34px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}
.act-btn {
  padding: 7px 9px;
  font-size: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
  line-height: 1.3;
  white-space: nowrap;
}
.act-btn:active { background: var(--active); border-color: var(--active); color: #fff; }
.act-btn.reset-btn {
  border-color: var(--danger);
  color: var(--danger);
  background: rgba(190,40,40,.15);
}
.act-btn.reset-btn:active { background: var(--danger); border-color: var(--danger); color: #fff; }

/* ── hidden URL edit ── */
#url-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.85);
  border-radius: 50%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  z-index: 10;
}
#url-overlay.show { display: flex; }
#w-url {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  padding: 5px 8px;
  border-radius: 4px;
  width: 220px;
  text-align: center;
}
.url-ok-btn {
  padding: 6px 20px;
  background: var(--active);
  border: none;
  color: #fff;
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="dial">

  <!-- status: tap to edit URL -->
  <div class="status" onclick="showUrlEdit()" title="Tap to change URL">
    <div id="w-dot"></div>
    <span id="w-label">—</span>
    <span>🔋 <span id="w-bat">—</span>V</span>
  </div>

  <!-- D-pad -->
  <div class="dpad">
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="wb-fwd">↑</button>
    <div class="dpad-empty"></div>

    <button class="dpad-btn" id="wb-left">←</button>
    <button class="dpad-btn stop-btn" id="wb-stop">■</button>
    <button class="dpad-btn" id="wb-right">→</button>

    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="wb-back">↓</button>
    <div class="dpad-empty"></div>
  </div>

  <!-- Quick actions -->
  <div class="action-row">
    <button class="act-btn" onclick="sendAction(2)">Stand</button>
    <button class="act-btn" onclick="sendAction(12)">Sit</button>
    <button class="act-btn" onclick="sendAction(13)">Wave</button>
    <button class="act-btn reset-btn" onclick="sendAction(255)">Reset</button>
  </div>

  <!-- URL edit overlay -->
  <div id="url-overlay">
    <input id="w-url" type="text" value="ws://localhost:9090">
    <button class="url-ok-btn" onclick="applyUrl()">Connect</button>
  </div>

</div><!-- .dial -->

<script>
// ─── AUTO-DETECT HOST ────────────────────────────────────────────────────
const h = window.location.hostname;
const defaultUrl = (h && h !== 'localhost' && h !== '127.0.0.1')
  ? 'ws://' + h + ':9090'
  : 'ws://localhost:9090';
document.getElementById('w-url').value = defaultUrl;

// ─── ROS STATE ────────────────────────────────────────────────────────────
let ros = null, pubCmd, pubAction;
const VX = 0.45, VY = 0.40, WZ = 0.9;

function connect(url) {
  if (ros) { try { ros.close(); } catch (_) {} ros = null; }
  setStatus('wait');
  ros = new ROSLIB.Ros({ url });
  ros.on('connection', () => {
    setStatus('ok');
    pubCmd    = new ROSLIB.Topic({ ros, name: '/cmd_vel',          messageType: 'geometry_msgs/Twist' });
    pubAction = new ROSLIB.Topic({ ros, name: '/dogzilla/action',  messageType: 'std_msgs/Int32' });
    new ROSLIB.Topic({ ros, name: '/battery_voltage', messageType: 'std_msgs/Float32' })
      .subscribe(m => { document.getElementById('w-bat').textContent = m.data.toFixed(1); });
  });
  ros.on('error', () => setStatus('err'));
  ros.on('close', () => setStatus('off'));
}

function setStatus(s) {
  document.getElementById('w-dot').className   = s === 'ok' ? 'ok' : s === 'wait' ? 'wait' : '';
  document.getElementById('w-label').textContent = { ok:'●', wait:'…', err:'!', off:'○' }[s] || s;
}

// ─── VELOCITY ─────────────────────────────────────────────────────────────
let curDir = null;

function sendVel(vx, vy, wz) {
  if (!pubCmd) return;
  pubCmd.publish(new ROSLIB.Message({
    linear:  { x: vx, y: vy, z: 0 },
    angular: { x: 0,  y: 0,  z: wz },
  }));
}

function stopVel() { sendVel(0, 0, 0); curDir = null; }

// Repeat while button held
let repeatTimer = null;
function startRepeat(vx, vy, wz) {
  sendVel(vx, vy, wz);
  repeatTimer = setInterval(() => sendVel(vx, vy, wz), 100);
}
function endRepeat() {
  clearInterval(repeatTimer);
  repeatTimer = null;
  stopVel();
}

function bindDpad(id, vx, vy, wz) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); startRepeat(vx, vy, wz); }, { passive: false });
  btn.addEventListener('touchend',    () => endRepeat());
  btn.addEventListener('touchcancel', () => endRepeat());
  btn.addEventListener('mousedown',  () => startRepeat(vx, vy, wz));
  btn.addEventListener('mouseup',    () => endRepeat());
  btn.addEventListener('mouseleave', () => endRepeat());
}

bindDpad('wb-fwd',   VX,  0,   0);
bindDpad('wb-back',  -VX, 0,   0);
bindDpad('wb-left',  0,   VY,  0);
bindDpad('wb-right', 0,  -VY,  0);

// stop button is a tap, not hold
const stopBtn = document.getElementById('wb-stop');
stopBtn.addEventListener('touchstart', e => { e.preventDefault(); stopVel(); }, { passive: false });
stopBtn.addEventListener('mousedown',  () => stopVel());

// ─── ACTIONS ──────────────────────────────────────────────────────────────
function sendAction(id) {
  if (pubAction) pubAction.publish(new ROSLIB.Message({ data: id }));
}

// ─── URL OVERLAY ──────────────────────────────────────────────────────────
function showUrlEdit() {
  document.getElementById('url-overlay').classList.add('show');
}
function applyUrl() {
  document.getElementById('url-overlay').classList.remove('show');
  connect(document.getElementById('w-url').value.trim());
}

// ─── STARTUP ──────────────────────────────────────────────────────────────
connect(defaultUrl);
</script>
</body>
</html>
